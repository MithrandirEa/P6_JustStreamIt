<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JustStreamIt</title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- CSS Modulaire JustStreamIt -->
        <link rel="stylesheet" href="css/main.css">
        <!-- Script de masquage des erreurs pour présentation -->
        <script src="presentation-mode.js"></script>
        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Utilitaires responsive -->
        <script src="utils/responsive.js"></script>
        <!-- Gestionnaire d'images -->
        <script src="utils/imageHandler.js"></script>
        <!-- Service API -->
        <script src="services/apiService.js"></script>
        <!-- Configuration application -->
        <script src="config/appConfig.js"></script>
        <!-- Gestionnaire d'initialisation -->
        <script src="utils/appInitializer.js"></script>
        <!-- Templates HTML -->
        <script src="templates/bestMovieTemplate.js"></script>
        <script src="templates/movieCardTemplate.js"></script>
        <script src="templates/sectionTemplate.js"></script>
        <script src="script.js"></script>
    </head>
    <body>
        <header class="original-header">
            <div class="container-fluid">
                <div class="row align-items-center h-100">
                    <div class="col-auto">
                        <img src="images/logo.png" alt="Logo JustStreamIt" class="logo-img">
                    </div>
                    <div class="col">
                        <p class="header-title mb-0">Vidéos à la demande</p>
                    </div>
                </div>
            </div>
        </header>
        <main class="main-content">
            <section class="bestFilm">
                <h1>Meilleur film</h1>
                <div class="loading-text">Chargement du meilleur film...</div>
            </section>
            
            <section class="bestRatedFilms">
                <h1>Films les mieux notés</h1>
                <div class="loading-text">Chargement des films...</div>
            </section>
            
            <section class="category1">
                <h1>Action</h1>
                <div class="loading-text">Chargement des films...</div>
            </section>
            
            <section class="category2">
                <h1>Mystery</h1>
                <div class="loading-text">Chargement des films...</div>
            </section>
            
            <section class="otherFilms">
                <h1> Autres :</h1>
                <div class="loading-text">Chargement des films...</div>
            </section>
        </main>
    </body>
</html>
